<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Digital Alchemist's Lab</title>
    <style>
        :root {
            --primary: #8e44ad;
            --secondary: #2ecc71;
            --dark: #2c3e50;
            --light: #ecf0f1;
        }

        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            color: var(--light);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
        }

        .lab-card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(10px);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 8px 32px 0 rgba(0, 0, 0, 0.37);
            border: 1px solid rgba(255, 255, 255, 0.18);
            width: 400px;
            text-align: center;
        }

        h1 { color: var(--secondary); margin-bottom: 1rem; }
        
        .input-group { margin-bottom: 1.5rem; }
        
        input {
            width: 80%;
            padding: 10px;
            border-radius: 5px;
            border: none;
            margin-bottom: 10px;
            background: rgba(255, 255, 255, 0.1);
            color: white;
        }

        button {
            background: var(--primary);
            color: white;
            border: none;
            padding: 12px 24px;
            border-radius: 30px;
            cursor: pointer;
            font-weight: bold;
            transition: 0.3s;
        }

        button:hover { transform: scale(1.05); background: #9b59b6; }

        .result-box {
            margin-top: 20px;
            padding: 15px;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 10px;
            min-height: 50px;
            font-family: 'Courier New', Courier, monospace;
            border-left: 4px solid var(--secondary);
        }

        .label { font-size: 0.8rem; color: #aaa; margin-bottom: 5px; display: block; }
    </style>
</head>
<body>

<div class="lab-card">
    <h1>🧪 Alchemy Lab</h1>
    <p>Standard & User-Defined Function Test</p>

    <div class="input-group">
        <span class="label">Enter Ingredient Name:</span>
        <input type="text" id="ingredientInput" placeholder="e.g. Mandrake Root">
        
        <span class="label">Input Base Energy:</span>
        <input type="number" id="energyInput" placeholder="e.g. 88.76">
    </div>

    <button onclick="mainExperiment()">Transmute Potion</button>

    <div class="result-box" id="output">
        Waiting for experiment...
    </div>
</div>

<script>
    /**
     * 1. USER-DEFINED FUNCTION (The "Secret Recipe")
     * Transmutes an ingredient by reversing it.
     */
    function transmute(str) {
        // Uses standard split(), reverse(), and join() inside custom logic
        return str.split('').reverse().join('');
    }

    /**
     * 2. USER-DEFINED FUNCTION (Arrow Style)
     * Calculates potency based on a multiplier.
     */
    const calculatePotency = (base, multiplier = 1.5) => (base * multiplier).toFixed(2);

    /**
     * 3. THE MAIN EXPERIMENT (Connecting everything)
     */
    function mainExperiment() {
        // --- STANDARD FUNCTIONS (The "Natural Laws") ---
        const rawName = document.getElementById('ingredientInput').value;
        const rawEnergy = parseFloat(document.getElementById('energyInput').value) || 0;
        
        const cleanedName = rawName.trim().toUpperCase(); // Standard: trim & upperCase
        const stableEnergy = Math.round(rawEnergy);       // Standard: Math.round
        const time = new Date().toLocaleTimeString();     // Standard: Date object

        // --- APPLYING USER-DEFINED FUNCTIONS ---
        const finalName = transmute(cleanedName);
        const finalPower = calculatePotency(stableEnergy);

        // Displaying results
        const display = document.getElementById('output');
        display.innerHTML = `
            <strong>Brew Time:</strong> ${time}<br>
            <strong>Transmuted:</strong> ${finalName}<br>
            <strong>Final Power:</strong> ${finalPower} LP
        `;
        
        console.log(`Experiment Successful at ${time}`);
    }
</script>

</body>
</html>
